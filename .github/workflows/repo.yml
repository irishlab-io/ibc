---
name: CI - Repository
run-name: Continuous Integration for ${{ github.repository }} on ${{ github.head_ref || github.ref_name }} by ${{ github.actor }}

on: # yamllint disable-line rule:truthy
  schedule:
    - cron: "0 0 * * 0"
  pull_request:
    types:
      - opened
      - synchronize
  workflow_dispatch:

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:

  pinned-actions:
    if: ${{ github.event_name == 'schedule' }}
    name: Call GH Pinned Actions
    uses: irishlab-io/.github/.github/workflows/reusable-gh-pin-actions.yml@main
    with:
      allowlist: "${{ github.repository_owner }}/"

  auto-merge:
    if: ${{ github.event_name == 'pull_request' }}
    name: Call Dependabot Auto-Merge
    uses: irishlab-io/.github/.github/workflows/reusable-dependabot-auto.yml@main
