---
name: ibc

services:
  ibc:
    container_name: ibc
    image: ghcr.io/mighty-muffin/ibc:latest
    restart: unless-stopped
    ports:
      - 8000:8000
    networks:
      - cloudflared
    # Health check configuration for Docker Compose orchestration
    # Note: This duplicates the Dockerfile HEALTHCHECK but allows
    # Docker Compose to track and report container health status
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/login"]
      interval: 10s
      timeout: 10s
      start_period: 30s
      retries: 3

  cloudflare-tunnel:
    image: docker.io/cloudflare/cloudflared:latest
    container_name: cloudflare-tunnel
    restart: unless-stopped
    command: tunnel run
    environment:
      TUNNEL_TOKEN: ${CF_TUNNEL_TOKEN}
      TZ: America/New_York
    networks:
      - cloudflared

networks:
  cloudflared:
    name: cloudflared
